[package]
name = "atelier"
version = "0.0.88"
edition = "2021"
description = "a Computational Workshop for Market Microstructure Modeling, Synthetic Simulation and Historical Replay"
authors = ["IteraLabs.ai <contact@iteralabs.ai>"]
license = "Apache-2.0"
keywords = ["machine-learning", "framework", "math", "crypto", "trading"]
categories = ["data-structures", "development-tools", "finance", "simulation"]
documentation = "https://docs.rs/atelier/"
repository = "https://github.com/iteralabs/atelier"

# include = ["src/**/*", "katex-header.html"]

[dependencies]

# Atelier workbench
#atelier-data = { workspace = true, version = "0.0.1" }
#atelier-client = { workspace = true, version = "0.0.1" }
#atelier-engine = { workspace = true, version = "0.0.1" }
#atelier-generators = { workspace = true, version = "0.0.1" }
#atelier-execution = { workspace = true, version = "0.0.1" }
#atelier-server = { workspace = true, version = "0.0.1" }
#atelier-visuals = { workspace = true, version = "0.0.1" }

# Error Handling
thiserror = { version = "1.0.64" }

# Probabilistic features
rand = { workspace = true }
rand_distr = { workspace = true }

# Async, event-driven processing
crossbeam = "0.8"
rdkafka = "0.37.0"
serde = { version = "1.0.203", features = ["derive"] }

# Logging
tracing = { version = "0.1.41" }
tracing-subscriber = { version = "0.3.19" }

# Crytographic Signatures
hmac = { version = "0.12.1" }
sha2 = { version = "0.10.8" }
hex = { version = "0.4.3" }
base64 = { version = "0.22.1" }

